<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SS4</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100vw;height:100vh;overflow:hidden;font-family:'Poppins',sans-serif}
.wrap{width:100vw;height:100vh;background:#0D0F0A;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:4vh 5vw}
.headline-area{text-align:center;padding-top:1vh}
.badge{background:rgba(255,60,0,0.2);color:#FF3C00;font-size:1.4vh;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:0.6vh 2vw;border-radius:2vw;display:inline-block;margin-bottom:1.5vh}
.headline{font-size:4.2vh;font-weight:900;color:#fff;line-height:1.15;text-align:center}
.headline em{color:#FF3C00;font-style:normal}
.phone{width:52vw;max-width:220px;background:#0D0D0D;border-radius:3.5vw;overflow:hidden;box-shadow:0 4vh 6vh rgba(0,0,0,0.4);border:0.5vw solid #1a1a1a}
.phone-notch{width:30%;height:2.5vh;background:#0D0D0D;margin:0 auto;border-radius:0 0 2vw 2vw}
.phone-screen{background:#0D0D0D;padding:2vh 3vw}
.status-bar{display:flex;justify-content:space-between;margin-bottom:1vh;opacity:0.4}
.status-text{font-size:1.2vh;color:#fff;font-weight:600}
.tabs{display:flex;gap:1.5vw;margin-bottom:1.5vh;border-bottom:1px solid rgba(255,255,255,0.07);padding-bottom:1vh}
.tab{font-size:1.1vh;color:rgba(255,255,255,0.3);font-weight:600;padding-bottom:0.5vh}
.tab.active{color:#FF3C00;border-bottom:2px solid #FF3C00}
.big-stats{display:flex;justify-content:space-between;margin-bottom:1.5vh}
.big-stat{text-align:center}
.big-num{font-size:2.8vh;font-weight:900;color:#fff}
.big-label{font-size:0.9vh;color:rgba(255,255,255,0.35);margin-top:0.2vh}
.heatmap{margin-bottom:1.2vh}
.hm-label{font-size:1vh;color:rgba(255,255,255,0.3);margin-bottom:0.5vh;font-weight:600;text-transform:uppercase;letter-spacing:0.08em}
.hm-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0.5vw}
.hm-cell{aspect-ratio:1;border-radius:0.5vw}
.c0{background:#1a1a1a}
.c1{background:rgba(255,60,0,0.2)}
.c2{background:rgba(255,60,0,0.45)}
.c3{background:rgba(255,60,0,0.7)}
.c4{background:#FF3C00}
.milestone{background:#1a1a1a;border-radius:1.5vw;padding:1vh 2vw;display:flex;align-items:center;gap:1.5vw}
.m-icon{font-size:2.5vh}
.m-text{font-size:1.2vh;color:#fff;font-weight:600}
.m-sub{font-size:0.9vh;color:rgba(255,255,255,0.35)}
.footer-label{color:rgba(255,255,255,0.5);font-size:1.5vh;text-align:center;padding-bottom:1vh}
</style>
</head>
<body>
<div class="wrap">
  <div class="headline-area">
    <div class="badge">Screenshot 4 of 8</div>
    <div class="headline">See your <em>focus habits</em><br>at a glance.</div>
  </div>
  <div class="phone">
    <div class="phone-notch"></div>
    <div class="phone-screen">
      <div class="status-bar"><span class="status-text">9:41</span><span class="status-text">●●●</span></div>
      <div class="tabs">
        <span class="tab">7 Days</span>
        <span class="tab">30 Days</span>
        <span class="tab active">All Time</span>
      </div>
      <div class="big-stats">
        <div class="big-stat"><div class="big-num">312h</div><div class="big-label">focus time</div></div>
        <div class="big-stat"><div class="big-num">847</div><div class="big-label">tasks done</div></div>
        <div class="big-stat"><div class="big-num">2,419</div><div class="big-label">blocks held</div></div>
      </div>
      <div class="heatmap">
        <div class="hm-label">Activity — 12 weeks</div>
        <div class="hm-grid">
          <div class="hm-cell c1"></div><div class="hm-cell c2"></div><div class="hm-cell c0"></div><div class="hm-cell c3"></div><div class="hm-cell c2"></div><div class="hm-cell c1"></div><div class="hm-cell c0"></div>
          <div class="hm-cell c3"></div><div class="hm-cell c4"></div><div class="hm-cell c3"></div><div class="hm-cell c4"></div><div class="hm-cell c2"></div><div class="hm-cell c0"></div><div class="hm-cell c1"></div>
          <div class="hm-cell c2"></div><div class="hm-cell c3"></div><div class="hm-cell c4"></div><div class="hm-cell c4"></div><div class="hm-cell c3"></div><div class="hm-cell c2"></div><div class="hm-cell c1"></div>
          <div class="hm-cell c4"></div><div class="hm-cell c4"></div><div class="hm-cell c3"></div><div class="hm-cell c4"></div><div class="hm-cell c4"></div><div class="hm-cell c1"></div><div class="hm-cell c0"></div>
        </div>
      </div>
      <div class="milestone">
        <div class="m-icon">🔥</div>
        <div><div class="m-text">30-Day Streak</div><div class="m-sub">Best: 47 days · Current: 30</div></div>
      </div>
    </div>
  </div>
  <div class="footer-label">FocusFlow — Lifetime Stats & Heatmap</div>
</div>
</body>
</html>
