<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SS1</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100vw;height:100vh;overflow:hidden;font-family:'Poppins',sans-serif;background:#FF3C00}
.wrap{width:100vw;height:100vh;background:#FF3C00;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:4vh 5vw}
.headline-area{text-align:center;padding-top:1vh}
.badge{background:rgba(255,255,255,0.2);color:#fff;font-size:1.4vh;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:0.6vh 2vw;border-radius:2vw;display:inline-block;margin-bottom:1.5vh}
.headline{font-size:4.5vh;font-weight:900;color:#fff;line-height:1.15;text-align:center}
.phone{width:52vw;max-width:220px;background:#0D0D0D;border-radius:3.5vw;overflow:hidden;box-shadow:0 4vh 6vh rgba(0,0,0,0.4);border:0.5vw solid #1a1a1a}
.phone-notch{width:30%;height:2.5vh;background:#0D0D0D;margin:0 auto;border-radius:0 0 2vw 2vw;display:flex;align-items:center;justify-content:center}
.phone-dot{width:1vw;height:1vw;background:#222;border-radius:50%}
.phone-screen{background:#0D0D0D;padding:2vh 3vw}
.status-bar{display:flex;justify-content:space-between;margin-bottom:1.5vh;opacity:0.4}
.status-text{font-size:1.2vh;color:#fff;font-weight:600}
.section-title{font-size:1.6vh;font-weight:700;color:#FF3C00;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:1vh}
.task-card{background:#1a1a1a;border-radius:1.5vw;padding:1.5vh 2.5vw;margin-bottom:1vh;border-left:3px solid #FF3C00}
.task-name{font-size:1.5vh;color:#fff;font-weight:600}
.task-time{font-size:1.1vh;color:rgba(255,255,255,0.5);margin-top:0.3vh}
.task-focus{display:flex;align-items:center;gap:1vw;margin-top:0.6vh}
.focus-dot{width:1.5vw;height:1.5vw;background:#FF3C00;border-radius:50%;flex-shrink:0}
.focus-label{font-size:1.1vh;color:#FF3C00;font-weight:600}
.arrow-connector{text-align:center;color:rgba(255,255,255,0.3);font-size:2vh;margin:0.5vh 0}
.block-card{background:#1a0000;border-radius:1.5vw;padding:1.2vh 2.5vw;border:1px solid rgba(255,60,0,0.3)}
.block-header{font-size:1.2vh;color:rgba(255,255,255,0.4);margin-bottom:0.5vh;font-weight:600;text-transform:uppercase;letter-spacing:0.08em}
.blocked-apps{display:flex;gap:1vw;flex-wrap:wrap}
.app-chip{background:rgba(255,60,0,0.15);border:1px solid rgba(255,60,0,0.3);color:#FF3C00;font-size:1.1vh;font-weight:700;padding:0.4vh 1.2vw;border-radius:1vw}
.auto-label{text-align:center;margin-top:1vh;font-size:1.1vh;color:rgba(255,255,255,0.25);font-style:italic}
.footer-label{color:rgba(255,255,255,0.7);font-size:1.5vh;text-align:center;padding-bottom:1vh}
</style>
</head>
<body>
<div class="wrap">
  <div class="headline-area">
    <div class="badge">Screenshot 1 of 8</div>
    <div class="headline">Block apps when your<br>task starts. Automatically.</div>
  </div>
  <div class="phone">
    <div class="phone-notch"><div class="phone-dot"></div></div>
    <div class="phone-screen">
      <div class="status-bar">
        <span class="status-text">9:41</span>
        <span class="status-text">●●●</span>
      </div>
      <div class="section-title">Today's Focus</div>
      <div class="task-card">
        <div class="task-name">Write Project Report</div>
        <div class="task-time">9:00 AM – 11:00 AM · 2h</div>
        <div class="task-focus">
          <div class="focus-dot"></div>
          <div class="focus-label">Focus Mode ON</div>
        </div>
      </div>
      <div class="arrow-connector">↓ auto-blocks</div>
      <div class="block-card">
        <div class="block-header">Blocked during session</div>
        <div class="blocked-apps">
          <span class="app-chip">Instagram</span>
          <span class="app-chip">YouTube</span>
          <span class="app-chip">Reddit</span>
          <span class="app-chip">Twitter</span>
        </div>
        <div class="auto-label">Lifts at 11:00 AM automatically</div>
      </div>
    </div>
  </div>
  <div class="footer-label">FocusFlow — Task-Linked Blocking</div>
</div>
</body>
</html>
