name: Build NodeSpy APK

# Pure Kotlin/Jetpack Compose Android app — no Expo, no JS, no pnpm needed.
# Always produces a debug APK. Also produces a signed release APK when the
# RELEASE_KEYSTORE_BASE64 secret is set (reuse the same FocusFlow keystore).
#
# ── Optional secrets for signed release build ─────────────────────────────────
#   RELEASE_KEYSTORE_BASE64   base64-encoded .jks keystore file
#   RELEASE_STORE_PASSWORD    keystore store password
#   RELEASE_KEY_ALIAS         key alias inside the keystore
#   RELEASE_KEY_PASSWORD      key password
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dorg.gradle.daemon=false"

jobs:
  build:
    name: Build NodeSpy APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-nodespy-gradle-${{ hashFiles('artifacts/nodespy/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-nodespy-gradle-

      - name: Build debug APK
        working-directory: artifacts/nodespy
        run: |
          gradle assembleDebug --no-daemon --stacktrace
          echo "── Debug APK output ──"
          find app/build/outputs/apk/debug/ -name "*.apk" -exec ls -lh {} \;

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nodespy-debug-${{ github.run_number }}
          path: artifacts/nodespy/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Check keystore secret
        id: keystore-check
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}

      - name: Build release APK (signed)
        if: steps.keystore-check.outputs.available == 'true'
        working-directory: artifacts/nodespy
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          STORE_PASS: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_B64" | base64 --decode > release.keystore
          gradle assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$(pwd)/release.keystore" \
            -Pandroid.injected.signing.store.password="$STORE_PASS" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASS"
          rm -f release.keystore
          echo "── Release APK output ──"
          find app/build/outputs/apk/release/ -name "*.apk" -exec ls -lh {} \;

      - name: Upload release APK
        if: steps.keystore-check.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: nodespy-release-${{ github.run_number }}
          path: artifacts/nodespy/app/build/outputs/apk/release/*.apk
          retention-days: 30
