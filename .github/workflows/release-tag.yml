name: Release (Tag)

# Builds a signed release APK + AAB via Expo Prebuild and publishes a
# GitHub Release whenever a version tag is pushed (e.g. v1.0.0).
# Skips automatically if the tag ends with -debug (those go to debug-tag.yml).
#
# ── How to trigger ────────────────────────────────────────────────────────────
#   git tag v1.0.0
#   git push origin v1.0.0
#
# ── Required secrets ──────────────────────────────────────────────────────────
#   RELEASE_KEYSTORE_BASE64   base64-encoded .jks keystore file
#   RELEASE_STORE_PASSWORD    keystore store password
#   RELEASE_KEY_ALIAS         key alias inside the keystore
#   RELEASE_KEY_PASSWORD      key password
#   SLACK_WEBHOOK_URL         Slack incoming webhook URL (optional)
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  NPM_CONFIG_NODE_LINKER: hoisted
  EXPO_ROUTER_APP_ROOT: app

jobs:
  release:
    name: Release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    if: ${{ !endsWith(github.ref_name, '-debug') }}

    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Expo Prebuild
        working-directory: artifacts/focusflow
        run: npx expo prebuild --platform android --clean --no-install

      - name: Inject ProGuard rules
        working-directory: artifacts/focusflow
        run: |
          if [ -f proguard-rules.pro ]; then
            cp proguard-rules.pro android/app/proguard-rules.pro
          fi

      - name: Enable R8 full mode
        working-directory: artifacts/focusflow/android
        run: |
          echo "" >> gradle.properties
          echo "android.enableR8.fullMode=true" >> gradle.properties

      - name: Decode release keystore
        working-directory: artifacts/focusflow/android/app
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore
          echo "Keystore size: $(du -sh release.keystore)"

      - name: Build release APK
        working-directory: artifacts/focusflow/android
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$(pwd)/app/release.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.RELEASE_STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.RELEASE_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.RELEASE_KEY_PASSWORD }}"

      - name: Build release AAB
        working-directory: artifacts/focusflow/android
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"
        run: |
          ./gradlew bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$(pwd)/app/release.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.RELEASE_STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.RELEASE_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.RELEASE_KEY_PASSWORD }}"

      - name: Rename build outputs
        run: |
          APK=$(find artifacts/focusflow/android/app/build/outputs/apk/release/ \
            -name "app-universal-release.apk" -o -name "app-release.apk" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find artifacts/focusflow/android/app/build/outputs/apk/release/ \
              -name "*.apk" | head -1)
          fi
          echo "Using APK: $APK"
          cp "$APK" focusflow-${{ github.ref_name }}.apk
          cp artifacts/focusflow/android/app/build/outputs/bundle/release/app-release.aab \
             focusflow-${{ github.ref_name }}.aab

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: FocusFlow ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            focusflow-${{ github.ref_name }}.apk
            focusflow-${{ github.ref_name }}.aab

      - name: Remove keystore from runner
        if: always()
        working-directory: artifacts/focusflow/android/app
        run: rm -f release.keystore

      - name: Notify Slack
        if: env.SLACK_WEBHOOK_URL != ''
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"attachments\":[{\"color\":\"good\",\"text\":\":rocket: *FocusFlow ${{ github.ref_name }}* released! APK + AAB on GitHub Releases.\",\"mrkdwn_in\":[\"text\"]}]}"
