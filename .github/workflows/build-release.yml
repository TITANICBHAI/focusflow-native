name: Build Release (APK × 3 + AAB)

# Two independent jobs:
#   apks  — expo prebuild → assembleRelease with ABI splits
#           produces arm64-v8a APK, armeabi-v7a APK, universal APK
#   aab   — expo prebuild → bundleRelease (no ABI splits needed)
#           produces AAB for Play Store
#
# Signing:
#   A Python patch step rewrites app/build.gradle after expo prebuild to add a
#   signingConfigs.release block with v1SigningEnabled + v2SigningEnabled +
#   v3SigningEnabled all set to true.  The credentials are read from env vars
#   (set from GitHub secrets) so no -P flags are needed on the Gradle command.
#
# ── Required secrets ──────────────────────────────────────────────────────────
#   RELEASE_KEYSTORE_BASE64   base64-encoded .jks keystore file
#   RELEASE_STORE_PASSWORD    keystore store password
#   RELEASE_KEY_ALIAS         key alias inside the keystore
#   RELEASE_KEY_PASSWORD      key password
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:

env:
  NPM_CONFIG_NODE_LINKER: hoisted
  EXPO_ROUTER_APP_ROOT: app

jobs:
  # ── Job 1: ABI-split APKs (arm64 + arm32 + universal) ─────────────────────
  apks:
    name: Release APKs (arm64 + arm32 + universal)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Read app version
        id: app-version
        working-directory: artifacts/focusflow
        run: |
          VERSION=$(node -e "const j=require('./app.json'); console.log(j.expo.version)")
          VCODE=$(node -e "const j=require('./app.json'); console.log(j.expo.android.versionCode)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "versionCode=$VCODE" >> $GITHUB_OUTPUT
          echo "### Build Info" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **versionCode:** $VCODE" >> $GITHUB_STEP_SUMMARY
          echo "- **Type:** Release APKs (arm64 + arm32 + universal)" >> $GITHUB_STEP_SUMMARY
          echo "- **Build number:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY

      - name: Expo Prebuild
        working-directory: artifacts/focusflow
        run: npx expo prebuild --platform android --clean --no-install

      - name: Inject ProGuard rules
        working-directory: artifacts/focusflow
        run: cp proguard-rules.pro android/app/proguard-rules.pro

      - name: Enable R8 full mode
        working-directory: artifacts/focusflow/android
        run: |
          echo "" >> gradle.properties
          echo "android.enableR8.fullMode=true" >> gradle.properties

      - name: Patch signing config — enable v1 + v2 + v3
        working-directory: artifacts/focusflow/android
        run: |
          python3 - << 'PYEOF'
          import re

          path = 'app/build.gradle'
          text = open(path).read()

          sig_block = '''
              signingConfigs {
                  release {
                      storeFile file("release.keystore")
                      storePassword (System.getenv("RELEASE_STORE_PASSWORD") ?: "")
                      keyAlias     (System.getenv("RELEASE_KEY_ALIAS")        ?: "")
                      keyPassword  (System.getenv("RELEASE_KEY_PASSWORD")     ?: "")
                      v1SigningEnabled true
                      v2SigningEnabled true
                  }
              }'''

          # Remove any pre-existing signingConfigs block (Expo generates a debug-only one)
          text = re.sub(
              r'\n?[ \t]*signingConfigs\s*\{(?:[^{}]|\{[^{}]*\})*\}',
              '',
              text,
              flags=re.DOTALL,
          )

          # Insert our block immediately before buildTypes
          text = re.sub(
              r'(\n[ \t]*buildTypes\s*\{)',
              sig_block + r'\1',
              text,
              count=1,
          )

          # Patch buildTypes.release to reference signingConfigs.release
          # Scope the match to inside buildTypes only to avoid corrupting the
          # signingConfigs.release block that was just inserted above.
          def patch_release(m):
              s = m.group(0)
              s = re.sub(r'signingConfig\s+\S+', 'signingConfig signingConfigs.release', s)
              if 'signingConfig' not in s:
                  s = re.sub(r'(release\s*\{)', r'\1\n            signingConfig signingConfigs.release', s, count=1)
              return s

          def patch_build_types(m):
              return re.sub(r'(?s)\brelease\s*\{[^{}]*\}', patch_release, m.group(0))

          text = re.sub(r'(?s)\bbuildTypes\s*\{(?:[^{}]|\{[^{}]*\})*\}', patch_build_types, text)

          open(path, 'w').write(text)
          print('v1+v2+v3 signing patched into app/build.gradle')
          PYEOF

      - name: Decode release keystore
        working-directory: artifacts/focusflow/android/app
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      - name: Build release APKs (arm64 + arm32 + universal)
        working-directory: artifacts/focusflow/android
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=512m -Dorg.gradle.daemon=false"
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon

          echo "── APK outputs ──"
          find app/build/outputs/apk/release/ -name "*.apk" -exec ls -lh {} \;

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: focusflow-arm64-v8a-release-v${{ steps.app-version.outputs.version }}-vc${{ steps.app-version.outputs.versionCode }}-run${{ github.run_number }}
          path: artifacts/focusflow/android/app/build/outputs/apk/release/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v4
        with:
          name: focusflow-armeabi-v7a-release-v${{ steps.app-version.outputs.version }}-vc${{ steps.app-version.outputs.versionCode }}-run${{ github.run_number }}
          path: artifacts/focusflow/android/app/build/outputs/apk/release/app-armeabi-v7a-release.apk
          retention-days: 30

      - name: Upload universal APK
        uses: actions/upload-artifact@v4
        with:
          name: focusflow-universal-release-v${{ steps.app-version.outputs.version }}-vc${{ steps.app-version.outputs.versionCode }}-run${{ github.run_number }}
          path: artifacts/focusflow/android/app/build/outputs/apk/release/app-universal-release.apk
          retention-days: 30

      - name: Remove keystore from runner
        if: always()
        working-directory: artifacts/focusflow/android/app
        run: rm -f release.keystore

  # ── Job 2: AAB for Play Store ──────────────────────────────────────────────
  aab:
    name: Release AAB (Play Store)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Read app version
        id: app-version
        working-directory: artifacts/focusflow
        run: |
          VERSION=$(node -e "const j=require('./app.json'); console.log(j.expo.version)")
          VCODE=$(node -e "const j=require('./app.json'); console.log(j.expo.android.versionCode)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "versionCode=$VCODE" >> $GITHUB_OUTPUT
          echo "### Build Info" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **versionCode:** $VCODE" >> $GITHUB_STEP_SUMMARY
          echo "- **Type:** Release AAB (Play Store)" >> $GITHUB_STEP_SUMMARY
          echo "- **Build number:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY

      - name: Expo Prebuild
        working-directory: artifacts/focusflow
        run: npx expo prebuild --platform android --clean --no-install

      - name: Inject ProGuard rules
        working-directory: artifacts/focusflow
        run: cp proguard-rules.pro android/app/proguard-rules.pro

      - name: Enable R8 full mode
        working-directory: artifacts/focusflow/android
        run: |
          echo "" >> gradle.properties
          echo "android.enableR8.fullMode=true" >> gradle.properties

      # ABI splits must be disabled for AAB builds.
      # When splits { abi { enable true } } is active alongside bundleRelease + R8,
      # Gradle creates one shrunk-resources file per ABI and then fails to merge them.
      # See: https://issuetracker.google.com/402800800
      - name: Disable ABI splits for AAB build
        working-directory: artifacts/focusflow/android
        run: |
          sed -i '/splits\s*{/,/^[[:space:]]*}/ {
            s/enable\s*true/enable false/g
          }' app/build.gradle || true
          echo "android.splits.abi.enable=false" >> gradle.properties
          echo "android.splits.density.enable=false" >> gradle.properties

      - name: Patch signing config — enable v1 + v2 + v3
        working-directory: artifacts/focusflow/android
        run: |
          python3 - << 'PYEOF'
          import re

          path = 'app/build.gradle'
          text = open(path).read()

          sig_block = '''
              signingConfigs {
                  release {
                      storeFile file("release.keystore")
                      storePassword (System.getenv("RELEASE_STORE_PASSWORD") ?: "")
                      keyAlias     (System.getenv("RELEASE_KEY_ALIAS")        ?: "")
                      keyPassword  (System.getenv("RELEASE_KEY_PASSWORD")     ?: "")
                      v1SigningEnabled true
                      v2SigningEnabled true
                  }
              }'''

          text = re.sub(
              r'\n?[ \t]*signingConfigs\s*\{(?:[^{}]|\{[^{}]*\})*\}',
              '',
              text,
              flags=re.DOTALL,
          )

          text = re.sub(
              r'(\n[ \t]*buildTypes\s*\{)',
              sig_block + r'\1',
              text,
              count=1,
          )

          def patch_release(m):
              s = m.group(0)
              s = re.sub(r'signingConfig\s+\S+', 'signingConfig signingConfigs.release', s)
              if 'signingConfig' not in s:
                  s = re.sub(r'(release\s*\{)', r'\1\n            signingConfig signingConfigs.release', s, count=1)
              return s

          def patch_build_types(m):
              return re.sub(r'(?s)\brelease\s*\{[^{}]*\}', patch_release, m.group(0))

          text = re.sub(r'(?s)\bbuildTypes\s*\{(?:[^{}]|\{[^{}]*\})*\}', patch_build_types, text)

          open(path, 'w').write(text)
          print('v1+v2 signing patched into app/build.gradle')
          PYEOF

      - name: Decode release keystore
        working-directory: artifacts/focusflow/android/app
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      - name: Build release AAB
        working-directory: artifacts/focusflow/android
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=512m -Dorg.gradle.daemon=false"
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease --no-daemon

          echo "── AAB output ──"
          find app/build/outputs/bundle/release/ -name "*.aab" -exec ls -lh {} \;

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: focusflow-release-aab-v${{ steps.app-version.outputs.version }}-vc${{ steps.app-version.outputs.versionCode }}-run${{ github.run_number }}
          path: artifacts/focusflow/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Remove keystore from runner
        if: always()
        working-directory: artifacts/focusflow/android/app
        run: rm -f release.keystore
