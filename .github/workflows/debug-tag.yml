name: Debug Release (Tag)

# Builds a debug APK via Expo Prebuild and publishes it as a pre-release
# on GitHub whenever a debug tag is pushed (e.g. v1.0.0-debug).
# No signing secrets required — debug builds are unsigned.
#
# ── How to trigger ────────────────────────────────────────────────────────────
#   git tag v1.0.0-debug
#   git push origin v1.0.0-debug
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - 'v*-debug'

permissions:
  contents: write

env:
  NPM_CONFIG_NODE_LINKER: hoisted
  EXPO_ROUTER_APP_ROOT: app

jobs:
  debug-release:
    name: Debug APK ${{ github.ref_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Read app version
        id: app-version
        working-directory: artifacts/focusflow
        run: |
          VERSION=$(node -e "const j=require('./app.json'); console.log(j.expo.version)")
          VCODE=$(node -e "const j=require('./app.json'); console.log(j.expo.android.versionCode)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "versionCode=$VCODE" >> $GITHUB_OUTPUT
          echo "### Build Info" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **versionCode:** $VCODE" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Type:** Debug APK (pre-release)" >> $GITHUB_STEP_SUMMARY

      - name: Expo Prebuild
        working-directory: artifacts/focusflow
        run: npx expo prebuild --platform android --clean --no-install

      - name: Bundle JavaScript into APK assets
        working-directory: artifacts/focusflow
        run: |
          mkdir -p android/app/src/main/assets
          npx expo export:embed \
            --platform android \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --dev false \
            --reset-cache

      - name: Build debug APK
        working-directory: artifacts/focusflow/android
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Verify APK was produced
        run: |
          APK="artifacts/focusflow/android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK" ]; then
            echo "APK built successfully: $(du -sh $APK)"
          else
            echo "ERROR: APK not found at $APK" && exit 1
          fi

      - name: Rename build output
        run: |
          cp artifacts/focusflow/android/app/build/outputs/apk/debug/app-debug.apk \
             focusflow-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: FocusFlow ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: true
          generate_release_notes: false
          body: Debug build — not for production use.
          files: focusflow-${{ github.ref_name }}.apk
