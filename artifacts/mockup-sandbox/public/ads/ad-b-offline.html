<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusFlow Ad B</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
  }
  .ad {
    width: 100vw;
    height: 100vh;
    background: #0A1628;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 6vh 7vw;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 1vw;
  }
  .logo-icon {
    width: 5vh;
    height: 5vh;
  }
  .logo-text {
    font-size: 2.2vh;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 0.02em;
  }
  .logo-text span {
    color: #FF3C00;
  }
  .middle {
    display: flex;
    flex-direction: column;
    gap: 2.5vh;
  }
  .eyebrow {
    font-size: 1.5vh;
    font-weight: 700;
    color: #FF3C00;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .headline {
    font-family: 'Poppins', sans-serif;
    font-size: 7.5vw;
    font-weight: 900;
    color: #ffffff;
    line-height: 1.05;
    max-width: 88%;
  }
  .headline em {
    color: #FF3C00;
    font-style: normal;
  }
  .proof {
    display: flex;
    align-items: center;
    gap: 1.5vw;
  }
  .proof-tag {
    background: rgba(255,60,0,0.15);
    border: 1px solid rgba(255,60,0,0.4);
    color: #FF3C00;
    font-size: 1.6vh;
    font-weight: 700;
    padding: 0.6vh 1.5vw;
    border-radius: 0.5vw;
  }
  .benefit {
    font-size: 2.2vh;
    font-weight: 400;
    color: rgba(255,255,255,0.6);
    line-height: 1.5;
  }
  .cta {
    display: inline-block;
    background: #FF3C00;
    color: #ffffff;
    font-family: 'Poppins', sans-serif;
    font-size: 2vh;
    font-weight: 700;
    padding: 1.6vh 4vw;
    border-radius: 0.8vw;
    text-decoration: none;
    align-self: flex-start;
    letter-spacing: 0.03em;
  }
  .footer {
    font-size: 1.6vh;
    color: rgba(255,255,255,0.25);
    font-weight: 400;
  }
</style>
</head>
<body>
<div class="ad">
  <div class="logo">
    <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="40" height="40" rx="8" fill="#FF3C00"/>
      <path d="M12 28 L20 12 L28 28" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M15 22 L25 22" stroke="white" stroke-width="3" stroke-linecap="round"/>
    </svg>
    <span class="logo-text">Focus<span>Flow</span></span>
  </div>

  <div class="middle">
    <div class="eyebrow">Freedom alternative</div>
    <div class="headline">Your blocker fails <em>offline.</em> Ours doesn't.</div>
    <div class="proof">
      <span class="proof-tag">✓ Airplane mode</span>
      <span class="proof-tag">✓ No VPN</span>
      <span class="proof-tag">✓ No cloud</span>
    </div>
    <div class="benefit">On-device enforcement via Android Accessibility Service. Blocks survive offline, reboot, and reinstall.</div>
    <a class="cta" href="#">Download Free</a>
  </div>

  <span class="footer">focusflow.app</span>
</div>
</body>
</html>
