kind = "video"
previewPath = "/focusflow-ad/"
title = "FocusFlow Commercial Ad"
version = "1.0.0"
id = "artifacts/focusflow-ad"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/focusflow-ad/" ]
localPort = 25669

[services.development]
run = "pnpm --filter @workspace/focusflow-ad run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/focusflow-ad", "run", "build" ]
publicDir = "artifacts/focusflow-ad/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25669"
BASE_PATH = "/focusflow-ad/"
